name: 🚀 HMS Auto Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install Frontend Dependencies
        working-directory: ./client
        run: npm ci

      - name: 🔨 Build Frontend
        working-directory: ./client
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🌐 Upload Frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "client/dist/."
          target: "/var/www/hms/frontend/"
          strip_components: 2

      - name: ⚙️ Upload Server Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "server/src,server/server.js,server/package.json,server/package-lock.json"
          target: "/var/www/hms/server/"
          strip_components: 1
          overwrite: true

      - name: 🔄 Install & Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/hms/server
            npm install --omit=dev --silent
            pm2 restart hms-backend || pm2 start server.js --name hms-backend
            pm2 save
            sleep 3
            pm2 status
            curl -sf http://localhost:5000/api/health && echo "✅ Backend healthy!" || echo "⚠️ Check backend"
            echo "🎉 HMS Deployed!"


