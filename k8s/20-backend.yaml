apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-backend
  namespace: hms-production
  labels:
    app: hms-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hms-backend
  template:
    metadata:
      labels:
        app: hms-backend
    spec:
      containers:
      - name: backend
        image: hms-backend:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: hms-backend-config
              key: PORT
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: hms-backend-config
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: hms-backend-config
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: hms-app-secret
              key: DB_PASS
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: hms-backend-config
              key: DB_NAME
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: hms-app-secret
              key: JWT_SECRET
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: hms-backend-config
              key: NODE_ENV
        - name: LOG_TO_CONSOLE
          valueFrom:
            configMapKeyRef:
              name: hms-backend-config
              key: LOG_TO_CONSOLE
        ports:
        - containerPort: 3000
          name: http
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: hms-production
spec:
  selector:
    app: hms-backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
