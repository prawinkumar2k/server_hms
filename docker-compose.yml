version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hms-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=hms_db
      - JWT_SECRET=supersecretkey_change_in_prod
      - NODE_ENV=production
    depends_on:
      - db
    networks:
      - hms-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hms-network
    restart: unless-stopped

  hms-orthanc:
    image: orthanc/orthanc:latest
    container_name: hms-orthanc
    ports:
      - "8042:8042" # REST API & DICOM Web Viewer
      - "4242:4242" # DICOM C-STORE Port for X-Rays
    volumes:
      - orthanc_data:/var/lib/orthanc/db
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    networks:
      - hms-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: hms-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hms_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - hms-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

networks:
  hms-network:
    driver: bridge

volumes:
  db_data:
  orthanc_data:
